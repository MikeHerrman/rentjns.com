  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="site-header" role="banner">
      <div class="nav">
        <div class="nav-inner container">
          <a class="brand" href="/index.html">JNS Vacation Rentals</a>

          <!-- Desktop inline nav -->
          <nav class="site-nav" aria-label="Primary">
            <ul class="nav-items">
              <li>
                <a class="nav-item" href="/views/rentals.html">Rentals</a>
              </li>
              <li><a class="nav-item" href="/views/events.html">Events</a></li>
              <li><a class="nav-item" href="/views/local.html">Local</a></li>
              <li><a class="nav-item" href="/views/about.html">About</a></li>
              <li><a class="nav-item" href="/views/contact.html">Contact</a></li>
            </ul>
          </nav>
          <!-- Hamburger controls -->
          <input type="checkbox" id="navcheck" class="navcheck" />
          <label for="navcheck" class="nav-toggle" aria-label="Open menu" aria-controls="nav-drawer" aria-expanded="false"></label>
        </div>

        <!-- Overlay + Drawer -->
        <div class="nav-overlay"></div>
        <aside class="nav-drawer" id="nav-drawer" role="dialog" aria-modal="true" aria-hidden="true" aria-label="Navigation">
          <a class="brand" href="/index.html">JNS Vacation Rentals</a>
          <nav aria-label="Mobile">
            <ul class="nav-items">
              <li>
                <a class="nav-item" href="/views/rentals.html">Rentals</a>
              </li>
              <li><a class="nav-item" href="/views/events.html">Events</a></li>
              <li><a class="nav-item" href="/views/local.html">Local</a></li>
              <li><a class="nav-item" href="/views/about.html">About</a></li>
              <li><a class="nav-item" href="/views/contact.html">Contact</a></li>
            </ul>
          </nav>
        </aside>
      </div>
    </header>

    <main id="main" class="fill-viewport rentals">
      <h1 class="page-title hidden">Browse JNS Vacation Rentals</h1>

      <section class="container rentals-shell" aria-label="Rental gallery">
        <!-- Top: main image + sliding info -->
        <div class="primary" data-open="false">
          <figure class="image-frame round shadow">
            <img
              id="rental-image"
              src=""
              alt=""
              width="1200"
              height="900"
              fetchpriority="high"
            />
          </figure>

          <aside class="info-panel" id="rental-info" aria-hidden="true" tabindex="-1">
            <!-- Populated from js/rentals.js; edit rental content there. -->
            <h2 class="h3" id="rental-title"></h2>
            <ul class="stats" aria-label="Property details">
              <li><strong>Sleeps:</strong> <span id="stat-sleeps"></span></li>
              <li><strong>Beds:</strong> <span id="stat-beds"></span></li>
              <li><strong>Baths:</strong> <span id="stat-baths"></span></li>
              <li><strong>Sq Ft:</strong> <span id="stat-sqft"></span></li>
              <li><strong>Pets:</strong> <span id="stat-pets"></span></li>
            </ul>
            <p id="rental-blurb"></p>
            <div class="panel-actions">
              <button type="button" class="btn btn-primary btn-gallery" data-action="open-gallery">View gallery</button>

              <a href="/views/contact.html" class="btn btn-primary">Check dates</a>
            </div>
          </aside>
        </div>
        <!-- Middle: Details button -->
        <div class="rentals-actions">
          <button class="info-toggle" aria-controls="rental-info" aria-expanded="false" title="Open details">
            <span class="icon" aria-hidden="true">+ Details</span>
            <span class="sr-only">Toggle details</span>
          </button>
        </div>

        <!-- Bottom: thumbnail carousel -->
        <div class="thumbs">
          <button class="thumbs-nav prev" aria-label="Previous rentals">‹</button>
          <div class="thumbs-track" aria-label="More rentals">
            <div class="thumbs-list" id="thumbs-list">
              <!-- Populated by JS -->
            </div>
          </div>
          <button class="thumbs-nav next" aria-label="Next rentals">›</button>
        </div>
      </section>
    </main>

    <footer class="footer" role="contentinfo">
      <small>&copy; <span id="year"></span> JNS Vacation Rentals</small>
    </footer>

    <script type="module" src="/js/main.js?v=3"></script>
    <script type="module" src="/js/rentals.js?v=3"></script>
